items:
  - question: How do I find the church?
    answer: >-
      Grace Life Church is on the road opposite Little Giggles Playschool in Seethammadhara
      — up the road from Alluri Seetharamaraju Statue Junction towards the mountain.
      Our address is 50-1-43, ASR Nagar, Seethammadhara, Visakhapatnam, Andhra Pradesh — 530013.
  - question: Where do I park?
    answer: >-
      There is parking space in front of the church building for bikes and scooters.
      Cars can be parked on the main street or on the street opposite the church building.
  - question: What about my children?
    answer: >-
      Kids are a priority for us. We have trained, caring teachers and age-appropriate Bible lessons
      based on the Generations of Grace curriculum — developed by graduates of The Master's Seminary
      at Grace Community Church.

      Ages 3–7 are taught using pictures and interactive dialogue. Ages 8–12 are taught by reading
      Scripture directly. A room is available for mothers with infants, and children above 12
      assist the teachers.
  - question: What should I wear?
    answer: >-
      The congregation generally wears formal or modest attire. Men typically wear shirts and formal
      trousers; women mostly wear Sari or Salwar Kameez. Dress comfortably and modestly — you are
      welcome as you are.
  - question: Do I need to be a Christian to attend?
    answer: >-
      Absolutely not. We welcome anyone who is curious about Jesus Christ. Our services are open
      to all, and you will never be put on the spot or pressured. Come as you are.
